name: MLOps CD Pipeline

on:
  workflow_dispatch: # Allows manual triggering from GitHub UI

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
        
    - name: Build and Push Backend
      uses: docker/build-push-action@v5
      with:
        context: ./MLOPS
        file: ./MLOPS/Dockerfile
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/6g_ids_mlops:latest
        
    - name: Build and Push Frontend
      uses: docker/build-push-action@v5
      with:
        context: ./app_web
        file: ./app_web/Dockerfile
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/6g_ids_frontend:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    
    steps:
    - name: Deploy Placeholder
      run: |
        echo "Deployment step: connect to server and run docker-compose pull && docker-compose up -d"
        echo "Requires SSH setup which depends on target environment."
